# vim:fileencoding=utf-8:foldmethod=marker

#: Fonts {{{
# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMonoNL Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 16.0
#: }}}

#: Text cursor customization {{{
cursor_stop_blinking_after 5.0

cursor_trail 200
# triggered time, milliseconds.

cursor_trail_decay 0.1 0.4

cursor_trail_start_threshold 2
# triggered distance position
cursor_trail_color cyan
#: }}}

#: Scrollback {{{
#: }}}

#: Mouse {{{
#: Mouse actions {{{
#: }}}
#: }}}

#: Performance tuning {{{
#: }}}

#: Terminal bell {{{
#: }}}

#: Window layout {{{
remember_window_size  no
initial_window_width  2560
initial_window_height 1600
enabled_layouts Tall,*
hide_window_decorations titlebar-only 
# titlebar-only: hide the titlebar while keeping the window shadow for resizing
# yes: hide the window decorations (title-bar and window borders) 
window_title_bar_min_windows 0
# 0 means never show. 
# 1 means always show. 
# 2 or more means show only when at least that many windows are visible.
window_title_bar_align center
#: }}}

#: Tab bar {{{
tab_bar_edge bottom
tab_bar_margin_width 9.0
tab_bar_margin_height 9.0 0.0
tab_bar_style separator
tab_bar_align center
tab_bar_min_tabs 2
tab_separator ""

# how to show the tab bar title elegantly?
# session, bell, task completion percent
# tab_activity_symbol none
tab_title_template "{fmt.fg._545c7e}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._545c7e} {title.split()[0]}{sup.index} {fmt.fg._545c7e}{fmt.bg.default} "
active_tab_title_template "{fmt.fg._7aa2f7}{fmt.bg.default}{fmt.fg._282c34}{fmt.bg._7aa2f7}{active_session_name}: {title.split()[0]}{sup.index} {fmt.fg._7aa2f7}{fmt.bg.default} "
#: }}}

#: Color scheme {{{
# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME
#: }}}

#: Advanced {{{
shell .
editor vim
notify_on_cmd_finish invisible 15
