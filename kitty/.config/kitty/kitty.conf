#: Scrolling {{{
#: }}}

#: Session management {{{
map kitty_mod+enter new_window_with_cwd
map kitty_mod+t new_tab_with_cwd
map kitty_mod+n new_os_window_with_cwd
# shift+f5 --relocatable for personal projects, it can be movable.
map shift+f5 save_as_session --relocatable --use-foreground-process --match=session:. .
# f5 --base-dir for global projects, e.x.: dotfiles, startup, .etc.
map f5 save_as_session --use-foreground-process --match=session:. --base-dir $HOME

# Press F7 and then s to jump to the "startup" project
map f7>d goto_session sessions/dotfiles.kitty-session
map f7>s goto_session sessions/startup.kitty-session

# Browse session files inside a directory and pick one
map f7>p goto_session sessions/
map f7>/ goto_session
# Go to the previously active session (larger negative numbers jump further back in history)
map f7>- goto_session -1
map f7>c close_session 
#: }}}

#: Window management {{{
#: }}}

#: Tab management {{{
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9
# -1: the previously active tab
map ctrl+alt+` goto_tab -1
#: }}}

#: Layout management {{{

#: Next layout

# map kitty_mod+l next_layout


#: You can also create shortcuts to switch to specific layouts::

#:     map ctrl+alt+t goto_layout tall
#:     map ctrl+alt+s goto_layout stack

#: Similarly, to switch back to the previous layout::

#:     map ctrl+alt+p last_used_layout

#: There is also a toggle_layout action that switches to the named
#: layout or back to the previous layout if in the named layout.
#: Useful to temporarily "zoom" the active window by switching to the
#: stack layout::

#:     map ctrl+alt+z toggle_layout stack
#: }}}

#: Select and act on visible text {{{

#: Insert selected path
map kitty_mod+p>f kitten hints --type path --program -

#: Open selected path
map kitty_mod+p>shift+f kitten hints --type path

#: Insert chosen file
map kitty_mod+p>c kitten choose-files
#: Insert chosen directory
map kitty_mod+p>d kitten choose-files --mode=dir
#::  <https://sw.kovidgoyal.net/kitty/kittens/choose-files/>

#: Insert selected line
map kitty_mod+p>l kitten hints --type line --program -

#: Insert selected word
map kitty_mod+p>w kitten hints --type word --program -

#: Insert selected hash
map kitty_mod+p>h kitten hints --type hash --program -

#: Open the selected file at the selected line
map kitty_mod+p>n kitten hints --type linenum

#: Open the selected hyperlink
map kitty_mod+p>y kitten hints --type hyperlink

#: The hints kitten has many more modes of operation that you can map
#: to different shortcuts. For a full description see hints kitten
#: <https://sw.kovidgoyal.net/kitty/kittens/hints/>.
#: }}}

